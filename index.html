<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios con IA</title>
    <!-- Usamos Tailwind CSS para un diseño moderno y responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="style/main.css">

</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">Sistema de Gestión de Usuarios</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- FORMULARIO -->
            <div class="bg-white p-6 rounded-xl shadow-md lg:col-span-1 h-fit">
                <h2 class="text-xl font-semibold mb-4 text-gray-700 border-b pb-2" id="formTitle">Nuevo Usuario</h2>
                
                <form id="userForm" class="space-y-4">
                    <input type="hidden" id="userId" value="">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                        <input type="text" id="nombre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Primer Apellido *</label>
                        <input type="text" id="apellido1" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Segundo Apellido</label>
                        <input type="text" id="apellido2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">DNI / NIE *</label>
                        <input type="text" id="dni" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico *</label>
                        <input type="email" id="correo" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    
                    <div class="pt-4 flex flex-col sm:flex-row gap-2">
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors shadow-sm">
                            Guardar Datos
                        </button>
                        <button type="button" id="btnCancel" class="hidden w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg transition-colors shadow-sm">
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <!-- TABLA DE DATOS -->
            <div class="bg-white p-6 rounded-xl shadow-md lg:col-span-2 overflow-hidden">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-semibold text-gray-700">Usuarios Registrados</h2>
                    <button onclick="loadUsers()" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-1 text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Refrescar
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider">
                                <th class="p-3 border-b">Nombre Completo</th>
                                <th class="p-3 border-b">DNI</th>
                                <th class="p-3 border-b">Correo</th>
                                <th class="p-3 border-b text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody" class="text-sm">
                            <!-- Los datos se insertarán aquí con JavaScript -->
                            <tr>
                                <td colspan="4" class="p-4 text-center text-gray-500">Cargando datos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenedor para notificaciones -->
    <div id="toast" class="toast"></div>

    <script src="JavaScript/main.js"></script>
</body>
</html>
